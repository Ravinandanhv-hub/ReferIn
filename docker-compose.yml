services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: referin
      POSTGRES_PASSWORD: referin_pass
      POSTGRES_DB: referin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referin -d referin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://referin:referin_pass@db:5432/referin_db
      SECRET_KEY: super-secret-key-change-in-production
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://localhost"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://referin:referin_pass@db:5432/referin_db
      SECRET_KEY: super-secret-key-change-in-production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
