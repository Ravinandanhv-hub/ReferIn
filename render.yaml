databases:
  - name: referin-db
    plan: free
    databaseName: referin
    user: referin

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: referin-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.db.seed
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: referin-db
          property: connectionURI
        # Render provides postgresql://, we need postgresql+asyncpg://
      - key: DATABASE_URL_ASYNC
        fromDatabase:
          name: referin-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.12

  # ── Frontend Static Site ─────────────────────────────────
  - type: web
    name: referin
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
